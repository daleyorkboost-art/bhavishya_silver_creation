<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Shop All Products | Bhavishya Silver Creation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { 'n-green': '#11261d', 'n-cream': '#fbf7f0', 'n-card': '#f4ead6', 'n-gold': '#dcb36d', 'n-gold-hover': '#cba153', 'n-text': '#1e3329', 'n-muted': '#8c9c94', }, fontFamily: { heading: ['"Playfair Display"', 'serif'], body: ['Lato', 'sans-serif'], } } } }
    </script>
    <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-n-cream text-n-text font-body overflow-x-hidden antialiased flex flex-col min-h-screen">

    <div id="header-placeholder"></div>

    <main class="flex-grow">
        <section class="bg-n-green/5 py-12 border-b border-n-muted/20">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center" data-aos="fade-up">
                <h1 class="font-heading text-5xl text-n-green mb-4">Our Collection</h1>
                <p class="text-gray-600 max-w-2xl mx-auto">Explore our curated selection of premium rings, necklaces, and earrings designed for brilliance.</p>
            </div>
        </section>

        <section class="py-12 bg-n-cream min-h-screen">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

                <div class="bg-white p-4 md:p-6 rounded-lg shadow-sm border border-n-muted/10 mb-10 flex flex-col md:flex-row justify-between items-center gap-6" data-aos="fade-up">
                    <div id="categoryFilters" class="flex flex-wrap gap-2 justify-center"></div>
                    <div class="flex w-full md:w-auto gap-4 items-center">
                        <div class="relative w-full md:w-64">
                            <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-n-muted"></i>
                            <input type="text" id="searchInput" placeholder="Search jewellery..." class="w-full pl-10 pr-4 py-2 bg-n-cream border border-n-muted/30 rounded focus:outline-none focus:border-n-gold transition text-sm">
                        </div>
                        <button id="resetFilters" class="text-red-500 hover:text-red-700 text-sm font-semibold underline whitespace-nowrap">Reset</button>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8" id="allProductsGrid"></div>

            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
</body>
</html>
